<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TEVFİK İLERİ AİHL – UFKA KANAT PRO V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Orbitron', sans-serif; touch-action:none; }
        canvas { display:block; width:100vw; height:100vh; position: fixed; top:0; left:0; }
        
        .overlay { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            display:flex; flex-direction:column; align-items:center; 
            justify-content:center; z-index:100; pointer-events: none; 
        }

        #menu { 
            background:linear-gradient(180deg, rgba(0,4,18,0.96) 0%, rgba(0,18,45,0.96) 100%); 
            cursor:pointer; pointer-events: auto; 
            transition: opacity 0.5s ease;
        }

        .tag { font-size:22px; color:#FFF; margin-bottom:10px; text-shadow: 0 0 10px #000; }
        .game-title { font-size:clamp(45px, 11vw, 95px); font-weight:900; color:#FF6600; text-shadow:0 0 50px #FF6600; margin-bottom:15px; text-align: center; }
        #hs-display { font-size:30px; color:#FFD700; margin-bottom:25px; }
        .credits { font-size:15px; color:#CCC; margin-bottom:35px; letter-spacing:1px; text-align: center; }
        
        .ctrl-box { 
            border: 2px solid rgba(0,229,255,0.4); padding: 20px; 
            border-radius: 12px; background: rgba(0,160,255,0.15); 
            color: #99BBDD; font-size: 14px; text-align: center; 
            line-height: 1.8; margin-bottom: 20px; max-width: 90%;
        }

        .vr-btn-hint { font-size:20px; color:#00FF88; animation:blink 1.2s infinite; margin-top:20px; font-weight: bold; }
        
        #hud { display:none; pointer-events:none; padding:40px; align-items:flex-start; justify-content:flex-start; z-index:50; }
        .hud-line { font-size:24px; color:#FF0000; text-shadow:3px 3px 6px #000; margin-bottom:10px; font-weight:900; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        
        #notif { 
            position:fixed; top:20%; color:#00FF88; font-size:36px; font-weight:900; 
            opacity:0; transition:0.4s; z-index:200; text-shadow: 0 0 30px #00FF88; 
            text-align: center; width: 100%; pointer-events: none;
        }

        #vr-control-button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,255,136,0.2); border: 1px solid #00FF88;
            color: #00FF88; padding: 12px 24px; font-family: 'Orbitron'; cursor: pointer;
            border-radius: 8px; font-size: 14px; font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="notif"></div>

    <div id="menu" class="overlay" onclick="handleGlobalClick(event)">
        <div class="tag">TEVFİK İLERİ AİHL</div>
        <div class="game-title">UFKA KANAT PRO</div>
        <div id="hs-display">REKOR: 0</div>
        <div class="credits">AHMET SAİD ADALAR | ÖMER PİLE | KEREM KARACA</div>
        <div class="ctrl-box">
            <strong>BİLGİSAYAR:</strong> W/S/A/D ve Boşluk<br>
            <strong>VR KONTROL:</strong> Sol Joystick (Yön), Sağ Joystick (Hız)<br>
            <strong>BUTONLAR:</strong> A/X (Yüksel), B/Y (Menü/Mağaza)
        </div>
        <div class="vr-btn-hint">BAŞLATMAK İÇİN DOKUNUN</div>
    </div>

    <div id="hud" class="overlay">
        <div id="skor-t" class="hud-line">PUAN: 0</div>
        <div id="bat-t" class="hud-line">BATARYA: %100</div>
        <div id="alt-t" class="hud-line">İRTİFA: 0m</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * VRButton Fallback & Controller Handler
         */
        const VRButtonManual = {
            createButton: function(renderer) {
                const btn = document.createElement('button');
                btn.id = "vr-control-button";
                btn.textContent = 'VR DESTEĞİ KONTROL EDİLİYOR...';
                
                if ('xr' in navigator) {
                    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
                        if (supported) {
                            btn.textContent = 'VR MODUNA GEÇ';
                            btn.style.display = "block";
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                navigator.xr.requestSession('immersive-vr', { 
                                    optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] 
                                }).then(session => {
                                    renderer.xr.setSession(session);
                                    startGame(); 
                                });
                            };
                        } else {
                            btn.textContent = 'VR MODU KULLANILAMIYOR';
                        }
                    });
                }
                return btn;
            }
        };

        'use strict';

        let scene, camera, renderer, clock, drone, props = [];
        let isPlaying = false, gameStarted = false;
        let points = 0, battery = 100, highScore = 0;
        let pos = new THREE.Vector3(0, 15, 0), vel = new THREE.Vector3(0, 0, 0), hpr = new THREE.Euler(0,0,0);
        const keys = {}, rings = [];
        
        // VR Gamepad Verileri
        const vrInput = { thrust: 0, turn: 0, forward: 0, upward: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7ECAFF);
            scene.fog = new THREE.FogExp2(0xAADDBB, 0.00007);

            camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.5, 300000);
            
            const canvas = document.getElementById('c');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;

            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xFFFFFF, 0.6));
            const sun = new THREE.DirectionalLight(0xFFFFFF, 1.0);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            document.body.appendChild(VRButtonManual.createButton(renderer));

            createEnvironment();
            createDrone();
            
            highScore = parseInt(localStorage.getItem('ufka_kanat_v5_pro_hs')) || 0;
            document.getElementById('hs-display').innerText = `REKOR: ${highScore}`;

            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            window.addEventListener('resize', onWindowResize);
            
            renderer.setAnimationLoop(animate);
            gameStarted = true;
        }

        function createEnvironment() {
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(150000, 150000),
                new THREE.MeshLambertMaterial({ color: 0x1E6525 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const rGeo = new THREE.TorusGeometry(12, 0.7, 16, 64);
            const rMatBlue = new THREE.MeshLambertMaterial({ color: 0x0088FF, emissive: 0x0088FF, emissiveIntensity: 0.8 });
            
            for(let i=0; i<200; i++) {
                const ring = new THREE.Mesh(rGeo, rMatBlue);
                ring.position.set((Math.random()-0.5)*2000, 30 + Math.random()*150, 600 + i*400);
                scene.add(ring);
                rings.push(ring);
            }
        }

        function createDrone() {
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 3), new THREE.MeshLambertMaterial({color: 0x222222}));
            drone.add(body);

            const propGeo = new THREE.BoxGeometry(2.5, 0.05, 0.2);
            const propMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.4});
            
            [[1.3, 0.4, 1.3], [-1.3, 0.4, 1.3], [1.3, 0.4, -1.3], [-1.3, 0.4, -1.3]].forEach(p => {
                const pr = new THREE.Mesh(propGeo, propMat);
                pr.position.set(p[0], p[1], p[2]);
                drone.add(pr);
                props.push(pr);
            });

            scene.add(drone);
            drone.visible = false;
        }

        function updateVRInput() {
            const session = renderer.xr.getSession();
            if (!session) return;

            vrInput.thrust = 0; vrInput.turn = 0; vrInput.forward = 0; vrInput.upward = 0;

            for (const source of session.inputSources) {
                if (source.gamepad) {
                    const axes = source.gamepad.axes; // [x-axis, y-axis]
                    const buttons = source.gamepad.buttons; // [trigger, grip, joystick-click, A, B, X, Y...]

                    // Sol Kontrolcü (Hareket ve Dönüş)
                    if (source.handedness === 'left') {
                        vrInput.turn = -axes[0]; // Joystick X
                        vrInput.forward = -axes[1]; // Joystick Y
                        // X veya Y Butonları (Oculus/Meta: X=4, Y=5)
                        if (buttons[4] && buttons[4].pressed) vrInput.upward = 1;
                        if (buttons[5] && buttons[5].pressed) console.log("Y Butonuna Basıldı - Mağaza");
                    }
                    // Sağ Kontrolcü (Yükseklik ve Hız)
                    if (source.handedness === 'right') {
                        // A veya B Butonları (Oculus/Meta: A=4, B=5)
                        if (buttons[4] && buttons[4].pressed) vrInput.upward = 1; 
                        if (buttons[5] && buttons[5].pressed) gameOver(); // B Butonu çıkış gibi
                        
                        // Tetik (Trigger) ile gaz verme
                        if (buttons[0].pressed) vrInput.forward = 1;
                    }
                }
            }
        }

        function startGame() {
            if(!gameStarted || isPlaying) return;
            isPlaying = true;
            points = 0; battery = 100;
            pos.set(0, 15, 0); vel.set(0, 0, 0); hpr.set(0, 0, 0);
            
            document.getElementById('menu').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
            }, 500);

            drone.visible = true;
            showNotif("SİSTEMLER AKTİF");
        }

        function handleGlobalClick() { if(!isPlaying) startGame(); }

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.1);
            
            if (isPlaying) {
                updateVRInput();

                let accel = new THREE.Vector3(0, -9.81, 0);
                
                // Klavye ve VR Input Birleştirme
                let moveForward = (keys['w'] ? 1 : 0) + (vrInput.forward > 0.1 ? vrInput.forward : 0);
                let moveBackward = (keys['s'] ? 1 : 0);
                let turnSpeed = (keys['a'] ? 3.5 : 0) - (keys['d'] ? 3.5 : 0) + (vrInput.turn * 4);
                let lift = (keys[' '] ? 50 : 0) + (vrInput.upward * 60);

                if (moveForward) { let m = new THREE.Vector3(0, 0, 95 * moveForward); m.applyEuler(hpr); accel.add(m); }
                if (moveBackward) { let m = new THREE.Vector3(0, 0, -60); m.applyEuler(hpr); accel.add(m); }
                
                hpr.y += turnSpeed * dt;
                accel.y += lift;

                // Fizik Hesaplama
                vel.add(accel.sub(vel.clone().multiplyScalar(1.6)).multiplyScalar(dt));
                pos.add(vel.clone().multiplyScalar(dt));

                drone.position.copy(pos);
                drone.rotation.copy(hpr);
                props.forEach((p, i) => p.rotation.y += (i % 2 === 0 ? 1 : -1));

                battery -= dt * 1.5;
                document.getElementById('skor-t').innerText = `PUAN: ${points}`;
                document.getElementById('bat-t').innerText = `BATARYA: %${Math.max(0, Math.floor(battery))}`;
                document.getElementById('alt-t').innerText = `İRTİFA: ${Math.floor(pos.y)}m`;

                rings.forEach(r => {
                    if(r.visible && pos.distanceTo(r.position) < 18) {
                        r.visible = false;
                        points += 1000;
                        battery = Math.min(100, battery + 20);
                        showNotif("+1000 VERİ");
                    }
                });

                // Kamera Takibi (VR dışındayken)
                if(!renderer.xr.isPresenting) {
                    let camOff = new THREE.Vector3(0, 15, -40);
                    camOff.applyEuler(hpr);
                    camera.position.lerp(pos.clone().add(camOff), 0.1);
                    camera.lookAt(pos);
                }

                if(pos.y < 0.5 || battery <= 0) gameOver();
            } else {
                const t = Date.now() * 0.0004;
                camera.position.set(Math.cos(t)*500, 250, Math.sin(t)*500);
                camera.lookAt(0,0,0);
            }
            renderer.render(scene, camera);
        }

        function gameOver() {
            isPlaying = false;
            drone.visible = false;
            if(points > highScore) {
                highScore = points;
                localStorage.setItem('ufka_kanat_v5_pro_hs', highScore);
                document.getElementById('hs-display').innerText = `REKOR: ${highScore}`;
            }
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('menu').style.opacity = '1';
            document.getElementById('hud').style.display = 'none';
            rings.forEach(r => r.visible = true);
        }

        function showNotif(m) {
            const n = document.getElementById('notif');
            n.innerText = m; n.style.opacity = '1';
            setTimeout(() => n.style.opacity = '0', 2000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
