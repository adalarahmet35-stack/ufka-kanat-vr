<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UFKA KANAT PRO V14 - TÜBİTAK 4006</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/xr/VRButton.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/xr/XRControllerModelFactory.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #001a33 0%, #000 100%); z-index: 1000; color: #00FFCC;
        }
        .ui-box {
            background: rgba(0, 20, 40, 0.9); padding: 30px; border: 2px solid #00FFCC;
            border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(0,255,204,0.2);
        }
        input {
            background: rgba(0,0,0,0.5); border: 1px solid #00FFCC; color: white;
            padding: 10px; font-family: 'Orbitron'; margin: 20px 0; width: 250px; outline: none;
        }
        .btn-start {
            padding: 15px 40px; font-size: 18px; background: #FF6600; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        #hud {
            position: fixed; top: 20px; left: 20px; color: #00FFCC; pointer-events: none;
            display: none; font-size: 14px;
        }
        .hud-val { color: #FF6600; font-weight: bold; }
        #leaderboard {
            margin-top: 20px; font-size: 12px; color: #aaa;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="ui-box">
            <h1 style="margin:0; letter-spacing:5px;">UFKA KANAT V14</h1>
            <p style="font-size: 12px; color: #FF6600;">TÜBİTAK 4006 BİLİM FUARI ÖZEL SÜRÜM</p>
            
            <input type="text" id="pilotName" placeholder="PİLOT ADI GİRİNİZ..." maxlength="12">
            <br>
            <button class="btn-start" id="start-btn">SİSTEMLERİ BAŞLAT</button>

            <div id="leaderboard">
                <p>--- EN İYİ PİLOTLAR ---</p>
                <div id="scoreList">Henüz kayıt yok.</div>
            </div>
        </div>
    </div>

    <div id="hud">
        PİLOT: <span id="hud-name" class="hud-val">-</span><br>
        SKOR: <span id="hud-score" class="hud-val">0</span><br>
        BATARYA: <span id="hud-bat" class="hud-val">%100</span><br>
        İRTİFA: <span id="hud-alt" class="hud-val">0</span>m
    </div>

    <script>
        let scene, camera, renderer, drone, clock, ringGroup;
        let isPlaying = false, pilotName = "Pilot";
        let score = 0, battery = 100;
        let velocity = new THREE.Vector3(), rotationY = 0;
        let inputState = { throttle: 0, yaw: 0, vertical: 0 };
        
        const leaderboard = JSON.parse(localStorage.getItem('droneScores') || '[]');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x00050a);
            scene.fog = new THREE.Fog(0x00050a, 20, 1000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            clock = new THREE.Clock();

            // Işıklandırma
            scene.add(new THREE.AmbientLight(0x4040ff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Zemin ve Halkalar
            createEnvironment();
            createDrone();
            setupControllers();
            updateLeaderboardDisplay();

            document.getElementById('start-btn').onclick = startFlight;
            renderer.setAnimationLoop(renderLoop);
        }

        function createEnvironment() {
            // Grid zemin
            const grid = new THREE.GridHelper(1000, 50, 0x00ffcc, 0x002233);
            scene.add(grid);

            // Toplanacak Halkalar
            ringGroup = new THREE.Group();
            const ringGeo = new THREE.TorusGeometry(3, 0.2, 16, 32);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xFF6600, emissive: 0xFF6600 });
            
            for(let i=0; i<15; i++) {
                const ring = new THREE.Mesh(ringGeo, ringMat.clone());
                ring.position.set(
                    (Math.random()-0.5)*200,
                    5 + Math.random()*20,
                    (Math.random()-0.5)*200
                );
                ring.rotation.y = Math.random() * Math.PI;
                ringGroup.add(ring);
            }
            scene.add(ringGroup);
        }

        function createDrone() {
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1.5), new THREE.MeshStandardMaterial({color: 0x333333}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({color: 0x00FFCC}));
            head.position.z = -0.8;
            drone.add(body, head);
            drone.position.y = 2;
            scene.add(drone);
        }

        function setupControllers() {
            const factory = new THREE.XRControllerModelFactory();
            for(let i=0; i<2; i++) {
                const c = renderer.xr.getController(i);
                scene.add(c);
                const g = renderer.xr.getControllerGrip(i);
                g.add(factory.createControllerModel(g));
                scene.add(g);
            }
        }

        function startFlight() {
            pilotName = document.getElementById('pilotName').value || "Bilinmiyor";
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('hud-name').innerText = pilotName;
            isPlaying = true;
        }

        function processInputs() {
            const session = renderer.xr.getSession();
            if (!session) return;
            
            inputState.throttle = 0; inputState.vertical = 0; inputState.yaw = 0;

            for (const source of session.inputSources) {
                if (!source.gamepad) continue;
                const b = source.gamepad.buttons;
                const a = source.gamepad.axes;

                if (source.handedness === 'right') {
                    if (b[0].pressed) inputState.throttle = 1; // Tetik: İleri
                    if (b[5].pressed) inputState.vertical = -1; // B: Aşağı
                } else {
                    if (b[4].pressed) inputState.vertical = 1; // A: Yukarı
                    if (Math.abs(a[2]) > 0.1) inputState.yaw = -a[2]; // Analog: Dönüş
                }
            }
        }

        function renderLoop() {
            const dt = clock.getDelta();
            if (isPlaying) {
                processInputs();

                // Fizik ve Hareket
                if (inputState.throttle && battery > 0) {
                    const dir = new THREE.Vector3(0,0,-1).applyEuler(drone.rotation);
                    velocity.add(dir.multiplyScalar(40 * dt));
                    battery -= 2 * dt;
                }
                
                velocity.y += (inputState.vertical * 20 * dt) - (0.1 * dt); // Yerçekimi
                velocity.multiplyScalar(0.97); // Sürtünme
                rotationY += inputState.yaw * 2.5 * dt;
                
                drone.rotation.y = rotationY;
                drone.position.add(velocity.clone().multiplyScalar(dt));
                if(drone.position.y < 0.1) { drone.position.y = 0.1; velocity.y = 0; }

                // TAKİP KAMERASI (Kritik Düzeltme)
                const camOffset = new THREE.Vector3(0, 2, 5).applyMatrix4(drone.matrixWorld);
                camera.position.lerp(camOffset, 0.1);
                camera.lookAt(drone.position);

                // Çarpışma Kontrolü (Halkalar)
                ringGroup.children.forEach(ring => {
                    if(drone.position.distanceTo(ring.position) < 4) {
                        ring.position.set((Math.random()-0.5)*200, 5 + Math.random()*20, (Math.random()-0.5)*200);
                        score += 100;
                        battery = Math.min(100, battery + 15); // Enerji tazele
                    }
                });

                // HUD Güncelle
                document.getElementById('hud-score').innerText = score;
                document.getElementById('hud-bat').innerText = `%${Math.floor(battery)}`;
                document.getElementById('hud-alt').innerText = Math.floor(drone.position.y);

                if(battery <= 0) gameOver();
            }
            renderer.render(scene, camera);
        }

        function gameOver() {
            isPlaying = false;
            leaderboard.push({ name: pilotName, score: score });
            leaderboard.sort((a,b) => b.score - a.score);
            localStorage.setItem('droneScores', JSON.stringify(leaderboard.slice(0,5)));
            
            alert(`BATARYA BİTTİ!\nSkorun: ${score}\nYeni uçuş için sayfayı yenileyin.`);
            location.reload();
        }

        function updateLeaderboardDisplay() {
            const html = leaderboard.slice(0,5).map((s, i) => `<div>${i+1}. ${s.name}: ${s.score}</div>`).join('');
            document.getElementById('scoreList').innerHTML = html || "Henüz kayıt yok.";
        }

        init();
    </script>
</body>
</html>
