<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UFKA KANAT V11 - SMOOTH FLIGHT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#87CEEB; font-family:'Orbitron', sans-serif; }
        canvas { display:block; width:100vw; height:100vh; position: fixed; top:0; left:0; }
        
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; pointer-events: none; }
        #menu { background: linear-gradient(to bottom, rgba(135,206,235,0.8), rgba(255,255,255,0.9)); cursor:pointer; pointer-events: auto; padding: 20px; text-align: center; width: 100%; height: 100%; overflow-y: auto; }
        
        .game-title { font-size:clamp(30px, 8vw, 80px); font-weight:900; color:#2E7D32; text-shadow:0 0 20px rgba(255,255,255,0.5); margin-bottom: 10px; }
        .start-btn { 
            background: linear-gradient(45deg, #4CAF50, #2E7D32); color: white; border: none; padding: 20px 40px; 
            border-radius: 50px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; font-size: 18px;
            pointer-events: auto; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.05); background: #1B5E20; }
        
        #hud { display:none; position: fixed; top: 20px; left: 20px; pointer-events:none; z-index:50; }
        .hud-line { font-size:14px; color:#fff; background: rgba(46,125,50,0.8); padding: 8px 15px; margin-bottom: 5px; border-left: 5px solid #FFD600; border-radius: 0 5px 5px 0; min-width: 160px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <div id="menu" class="overlay">
        <div class="game-title">UFKA KANAT V11</div>
        <p style="color: #1B5E20; letter-spacing: 4px; margin-bottom: 20px; font-weight: bold;">TEVFİK İLERİ - SMOOTH FLIGHT</p>
        
        <div style="margin: 20px; color: #333; font-size: 12px; line-height: 2; background: rgba(255,255,255,0.5); padding: 20px; border-radius: 15px; border: 1px solid #4CAF50;">
            <b>SAĞ TETİK:</b> GAZ | <b>SOL TETİK:</b> FREN<br>
            <b>SOL ANALOG:</b> YÖNLENDİRME | <b>A TUŞU:</b> YÜKSEL | <b>B TUŞU:</b> ALÇAL
        </div>

        <button class="start-btn" onclick="startVR()">VR MODUNDA BAŞLAT</button>
        <button class="start-btn" style="background: #555;" onclick="startGame()">MASAÜSTÜ BAŞLAT</button>
    </div>

    <div id="hud">
        <div class="hud-line">SKOR: <span id="skor-t">0</span></div>
        <div class="hud-line">İRTİFA: <span id="alt-t">0m</span></div>
        <div class="hud-line">HIZ: <span id="speed-t">0</span> km/s</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, drone, ground, rings = [], trees = [];
        let isPlaying = false;
        let score = 0;
        
        // Hareket ve Yumuşatma Değişkenleri
        let pos = new THREE.Vector3(0, 5, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        let rotationY = 0;
        let targetRotationY = 0;
        let currentTiltZ = 0;
        let currentTiltX = 0;

        const inputState = { throttle: 0, brake: 0, turn: 0, up: 0, down: 0 };
        const keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.0015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 15000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            createWorld();
            createDrone();
            setupControls();
            
            renderer.setAnimationLoop(animate);
        }

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 50px Orbitron';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#FFD600';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            return new THREE.CanvasTexture(canvas);
        }

        function createWorld() {
            const groundGeo = new THREE.PlaneGeometry(20000, 20000);
            groundGeo.rotateX(-Math.PI / 2);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x3d8c40, roughness: 0.9 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            scene.add(ground);

            const grid = new THREE.GridHelper(20000, 100, 0x2e7d32, 0x2e7d32);
            grid.position.y = 0.1;
            scene.add(grid);

            for(let i=0; i<200; i++) createTree();
            for(let i=0; i<40; i++) createRing(i);
        }

        function createTree() {
            const group = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.4, 0.6, 5, 8);
            const trunkMat = new THREE.MeshStandardMaterial({color: 0x4b2d0b});
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            const leafGeo = new THREE.ConeGeometry(3.5, 9, 8);
            const leafMat = new THREE.MeshStandardMaterial({color: 0x1b5e20});
            const leaves = new THREE.Mesh(leafGeo, leafMat);
            leaves.position.y = 6;
            group.add(trunk, leaves);
            group.position.set((Math.random()-0.5)*3000, 2.5, (Math.random()-0.5)*3000);
            scene.add(group);
            trees.push(group);
        }

        function createRing(i) {
            const ringGroup = new THREE.Group();
            const ringGeo = new THREE.TorusGeometry(8, 0.7, 16, 32);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffd600, emissive: 0xffd600, emissiveIntensity: 0.4 });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringGroup.add(ringMesh);

            const textMat = new THREE.MeshBasicMaterial({ 
                map: createTextTexture("TEVFİK İLERİ"), 
                transparent: true, side: THREE.DoubleSide
            });
            const textMesh = new THREE.Mesh(new THREE.PlaneGeometry(12, 3), textMat);
            ringGroup.add(textMesh);

            resetRing(ringGroup, i);
            scene.add(ringGroup);
            rings.push(ringGroup);
        }

        function resetRing(ring, i = 0) {
            ring.position.set((Math.random()-0.5)*1000, 10 + Math.random()*40, 
            drone ? drone.position.z - 600 - (Math.random()*1200) : -500 - (i*150));
            ring.visible = true;
        }

        function createDrone() {
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.05, 0.25), 
            new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.8, roughness: 0.3}));
            drone.add(body);
            
            const propGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.01, 16);
            const propMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.5});
            const posis = [[0.15, 0.03, 0.15], [-0.15, 0.03, 0.15], [0.15, 0.03, -0.15], [-0.15, 0.03, -0.15]];
            posis.forEach(p => {
                const pr = new THREE.Mesh(propGeo, propMat);
                pr.position.set(...p);
                drone.add(pr);
            });

            scene.add(drone);
            drone.add(camera);
            camera.position.set(0, 0.15, 0.5); 
        }

        function setupControls() {
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            const c1 = renderer.xr.getController(0);
            const c2 = renderer.xr.getController(1);
            scene.add(c1, c2);
        }

        async function startVR() {
            if (navigator.xr) {
                const session = await navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] });
                renderer.xr.setSession(session);
                startGame();
            } else { alert("WebXR desteklenmiyor."); }
        }

        function startGame() {
            isPlaying = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
        }

        function updateInputs() {
            inputState.throttle = keys['KeyW'] ? 1 : 0;
            inputState.brake = keys['KeyS'] ? 1 : 0;
            inputState.turn = (keys['KeyA'] ? 1 : 0) - (keys['KeyD'] ? 1 : 0);
            inputState.up = keys['Space'] ? 1 : 0;
            inputState.down = keys['ShiftLeft'] ? 1 : 0;

            const session = renderer.xr.getSession();
            if (session && session.inputSources) {
                for (const source of session.inputSources) {
                    if (!source.gamepad) continue;
                    const b = source.gamepad.buttons;
                    const a = source.gamepad.axes;
                    if (source.handedness === 'right') {
                        inputState.throttle = b[0].pressed ? 1 : 0;
                        inputState.up = b[4] && b[4].pressed ? 1 : 0;
                    }
                    if (source.handedness === 'left') {
                        inputState.turn = -a[2]; // Analog hassasiyeti
                        inputState.brake = b[0].pressed ? 1 : 0;
                        inputState.down = b[5] && b[5].pressed ? 1 : 0;
                    }
                }
            }
        }

        function animate() {
            if (!isPlaying) return;
            updateInputs();

            // YUMUŞAK DÖNÜŞ MANTIĞI
            const turnSpeed = 0.04;
            const smoothing = 0.1; // 0 ile 1 arası, düştükçe yumuşar
            
            targetRotationY += inputState.turn * turnSpeed;
            rotationY += (targetRotationY - rotationY) * smoothing;

            // Hız ve Momentum
            let accel = (inputState.throttle - inputState.brake) * 2.2;
            vel.x += (Math.sin(rotationY) * -accel - vel.x) * 0.05;
            vel.z += (Math.cos(rotationY) * -accel - vel.z) * 0.05;
            
            // Yükseklik yumuşatma
            let targetUp = (inputState.up - inputState.down) * 0.5;
            vel.y += (targetUp - vel.y) * 0.1;
            
            pos.add(vel);
            pos.y = Math.max(1, pos.y);

            drone.position.copy(pos);
            drone.rotation.y = rotationY;

            // Görsel Yatış (Tilt) Yumuşatma
            let targetTiltZ = -inputState.turn * 0.4;
            let targetTiltX = accel * 0.12;
            currentTiltZ += (targetTiltZ - currentTiltZ) * 0.1;
            currentTiltX += (targetTiltX - currentTiltX) * 0.1;
            
            drone.rotation.z = currentTiltZ;
            drone.rotation.x = currentTiltX;

            // Sonsuz Dünya
            ground.position.set(pos.x, 0, pos.z);

            rings.forEach(r => {
                r.lookAt(pos.x, r.position.y, pos.z);
                if(r.position.z > pos.z + 100) resetRing(r);
                if(r.visible && pos.distanceTo(r.position) < 12) {
                    r.visible = false;
                    score += 100;
                    document.getElementById('skor-t').innerText = score;
                }
            });

            trees.forEach(t => {
                if(t.position.z > pos.z + 500) {
                    t.position.z -= 3000;
                    t.position.x = pos.x + (Math.random()-0.5)*3000;
                }
            });

            document.getElementById('alt-t').innerText = Math.floor(pos.y) + "m";
            document.getElementById('speed-t').innerText = Math.floor(vel.length() * 45);
            
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
