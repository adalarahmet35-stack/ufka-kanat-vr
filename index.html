<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UFKA KANAT PRO V11 - VR FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#0a101a; font-family:'Orbitron', sans-serif; touch-action:none; }
        canvas { display:block; width:100vw; height:100vh; position: fixed; top:0; left:0; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; pointer-events: none; }
        #menu { background: radial-gradient(circle, rgba(5,20,40,0.85) 0%, rgba(2,5,15,1) 100%); cursor:pointer; pointer-events: auto; transition: opacity 0.6s ease; overflow-y: auto; padding: 20px; text-align: center; }
        .game-title { font-size:clamp(30px, 8vw, 80px); font-weight:900; color:#FF6600; text-shadow:0 0 30px rgba(255,102,0,0.5); margin-bottom:5px; }
        .controls-container { display: flex; gap: 20px; max-width: 90%; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; }
        .ctrl-card { flex: 1; min-width: 250px; border: 1px solid rgba(0,229,255,0.2); padding: 15px; border-radius: 15px; background: rgba(0,15,30,0.8); color: #fff; text-align: left; }
        .ctrl-card h3 { color: #00FF88; margin-bottom: 10px; font-size: 14px; }
        .ctrl-card p { font-size: 12px; line-height: 1.6; color: #ccc; }
        .start-btn-hint { font-size:14px; color:#00FF88; animation:blink 2s infinite; font-weight: bold; letter-spacing: 3px; margin-top: 10px; cursor: pointer; pointer-events: auto; }
        #hud { display:none; pointer-events:none; padding:30px; z-index:50; flex-direction: column; align-items: flex-start; }
        .hud-line { font-size:14px; color:#FFF; margin-bottom:8px; background: rgba(0,15,30,0.7); padding: 8px 15px; border-left: 4px solid #FF6600; min-width: 180px; display: flex; justify-content: space-between; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="menu" class="overlay">
        <div class="game-title">UFKA KANAT</div>
        <div class="controls-container">
            <div class="ctrl-card">
                <h3>🖥️ KLAVYE</h3>
                <p><b>W/S:</b> İleri/Geri</p>
                <p><b>A/D:</b> Sola/Sağa Kayma</p>
                <p><b>Q/E:</b> Dönüş</p>
                <p><b>SPACE/SHIFT:</b> Yukarı/Aşağı</p>
            </div>
            <div class="ctrl-card">
                <h3>🥽 VR KONTROLLER</h3>
                <p><b>Sağ Tetik:</b> Gaz | <b>Sol Tetik:</b> Fren</p>
                <p><b>Sol Analog:</b> Dönüş (Yaw)</p>
                <p><b>A / B Tuşları:</b> İrtifa +/-</p>
            </div>
        </div>
        <div class="start-btn-hint" onclick="startGame()">UÇUŞA BAŞLAMAK İÇİN DOKUNUN</div>
    </div>

    <div id="hud" class="overlay">
        <div class="hud-line">PUAN <span id="skor-t">0</span></div>
        <div class="hud-line">BATARYA <span id="bat-t">%100</span></div>
        <div class="hud-line">İRTİFA <span id="alt-t">0m</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock, drone, droneModel;
        let isPlaying = false;
        let pos = new THREE.Vector3(0, 1.2, -2), vel = new THREE.Vector3(0, 0, 0), rotationY = 0;
        const keys = {};
        const inputState = { forward: 0, backward: 0, turn: 0, up: 0, down: 0, moveX: 0 };
        const rings = [];

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a101a);
            scene.fog = new THREE.Fog(0x0a101a, 10, 1000);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(100, 200, 100);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 0.6));

            // Zemin Izgarası
            const grid = new THREE.GridHelper(2000, 100, 0x00ff88, 0x222222);
            scene.add(grid);

            // Drone Oluşturma
            createDrone();
            
            // Yüzükler (Puan toplama objeleri)
            createRings();

            // VR Kontrolcü Grupları
            setupVRControllers();

            // Klavye Dinleyicileri
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);

            clock = new THREE.Clock();
            renderer.setAnimationLoop(animate);
        }

        function createDrone() {
            drone = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.4, 0.1, 0.5);
            const bodyMat = new THREE.MeshStandardMaterial({color: 0xff6600, metalness: 0.7, roughness: 0.2});
            droneModel = new THREE.Mesh(bodyGeo, bodyMat);
            drone.add(droneModel);
            
            // Pervane Yerleri
            const propGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.01, 16);
            const propMat = new THREE.MeshBasicMaterial({color: 0x00ff88, transparent: true, opacity: 0.5});
            const offsets = [[0.2, 0, 0.2], [-0.2, 0, 0.2], [0.2, 0, -0.2], [-0.2, 0, -0.2]];
            offsets.forEach(o => {
                const p = new THREE.Mesh(propGeo, propMat);
                p.position.set(o[0], 0.05, o[2]);
                drone.add(p);
            });

            scene.add(drone);
            drone.visible = false;
        }

        function createRings() {
            const ringGeo = new THREE.TorusGeometry(3, 0.2, 16, 32);
            const ringMat = new THREE.MeshStandardMaterial({color: 0x00e5ff, emissive: 0x00e5ff, emissiveIntensity: 2});
            for(let i=0; i<20; i++) {
                const r = new THREE.Mesh(ringGeo, ringMat);
                r.position.set((Math.random()-0.5)*200, 5 + Math.random()*20, -50 - i*50);
                scene.add(r);
                rings.push(r);
            }
        }

        function setupVRControllers() {
            // Kontrolcü modellerini elle oluşturuyoruz (Kütüphane hatasını önlemek için)
            const controllerGeo = new THREE.BoxGeometry(0.05, 0.05, 0.15);
            const controllerMat = new THREE.MeshStandardMaterial({color: 0x444444});

            for(let i=0; i<2; i++) {
                const c = renderer.xr.getController(i);
                const model = new THREE.Mesh(controllerGeo, controllerMat);
                c.add(model);
                scene.add(c);
            }
        }

        function updateInputs() {
            // Reset
            inputState.forward = 0; inputState.backward = 0; inputState.turn = 0; 
            inputState.up = 0; inputState.down = 0; inputState.moveX = 0;

            // Klavye
            if(keys['KeyW']) inputState.forward = 1;
            if(keys['KeyS']) inputState.backward = 1;
            if(keys['KeyA']) inputState.moveX = -1;
            if(keys['KeyD']) inputState.moveX = 1;
            if(keys['KeyQ']) inputState.turn = 1;
            if(keys['KeyE']) inputState.turn = -1;
            if(keys['Space']) inputState.up = 1;
            if(keys['ShiftLeft']) inputState.down = 1;

            // VR Input
            const session = renderer.xr.getSession();
            if (session) {
                for (const source of session.inputSources) {
                    if (!source.gamepad) continue;
                    const axes = source.gamepad.axes;
                    const buttons = source.gamepad.buttons;

                    if (source.handedness === 'right') {
                        // Sağ tetik gaz, B tuşu aşağı
                        if (buttons[0].pressed) inputState.forward = buttons[0].value;
                        if (buttons[5]?.pressed) inputState.down = 1;
                        if (Math.abs(axes[2]) > 0.1) inputState.moveX = axes[2];
                    } 
                    else if (source.handedness === 'left') {
                        // Sol tetik fren, A tuşu yukarı, Sol analog dönüş
                        if (buttons[0].pressed) inputState.backward = buttons[0].value;
                        if (buttons[4]?.pressed) inputState.up = 1;
                        if (Math.abs(axes[2]) > 0.1) inputState.turn = -axes[2];
                    }
                }
            }
        }

        function startGame() {
            isPlaying = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            drone.visible = true;
            
            if (navigator.xr) {
                navigator.xr.isSessionSupported('immersive-vr').then(ok => {
                    if (ok && !renderer.xr.isPresenting) {
                        navigator.xr.requestSession('immersive-vr', {
                            optionalFeatures: ['local-floor', 'bounded-floor']
                        }).then(s => renderer.xr.setSession(s));
                    }
                });
            }
        }

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.1);

            if (isPlaying) {
                updateInputs();

                // Fizik
                let force = new THREE.Vector3(0, -9.8, 0); // Yerçekimi
                
                // İtki
                let thrust = (inputState.forward - inputState.backward) * 35;
                let tVec = new THREE.Vector3(0, 0, -thrust).applyEuler(new THREE.Euler(0, rotationY, 0));
                force.add(tVec);

                // Strafe (Yan hareket)
                let sVec = new THREE.Vector3(inputState.moveX * 25, 0, 0).applyEuler(new THREE.Euler(0, rotationY, 0));
                force.add(sVec);

                // İrtifa
                force.y += (inputState.up * 25) - (inputState.down * 25);
                
                // Dönüş
                rotationY += inputState.turn * 2.5 * dt;

                // Hız ve Sürtünme
                vel.add(force.sub(vel.clone().multiplyScalar(1.5)).multiplyScalar(dt));
                pos.add(vel.clone().multiplyScalar(dt));

                // Zemin limiti
                if(pos.y < 0.1) { pos.y = 0.1; vel.y = 0; }

                drone.position.copy(pos);
                drone.rotation.y = rotationY;

                // Animasyonel eğilme
                droneModel.rotation.x = THREE.MathUtils.lerp(droneModel.rotation.x, (inputState.forward - inputState.backward) * 0.4, 0.1);
                droneModel.rotation.z = THREE.MathUtils.lerp(droneModel.rotation.z, -inputState.moveX * 0.4, 0.1);

                // HUD Güncelleme
                document.getElementById('alt-t').innerText = Math.floor(pos.y) + "m";
                document.getElementById('skor-t').innerText = Math.floor(pos.z * -1);

                // Kamera (VR dışında takip için)
                if (!renderer.xr.isPresenting) {
                    const offset = new THREE.Vector3(0, 1.5, 4).applyEuler(new THREE.Euler(0, rotationY, 0));
                    camera.position.lerp(pos.clone().add(offset), 0.1);
                    camera.lookAt(pos);
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
