<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UFKA KANAT PRO V11 - VR EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#0a101a; font-family:'Orbitron', sans-serif; }
        canvas { display:block; width:100vw; height:100vh; position: fixed; top:0; left:0; }
        
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; pointer-events: none; }
        #menu { background: radial-gradient(circle, rgba(5,20,40,0.95) 0%, rgba(2,5,15,1) 100%); cursor:pointer; pointer-events: auto; padding: 20px; text-align: center; width: 100%; height: 100%; overflow-y: auto; }
        
        .game-title { font-size:clamp(30px, 8vw, 80px); font-weight:900; color:#FF6600; text-shadow:0 0 30px rgba(255,102,0,0.5); }
        .start-btn { 
            background: linear-gradient(45deg, #00FF88, #00A3FF); color: white; border: none; padding: 20px 40px; 
            border-radius: 50px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; font-size: 18px;
            pointer-events: auto; margin-top: 30px; box-shadow: 0 0 20px rgba(0,255,136,0.4);
        }
        
        #hud { display:none; position: fixed; top: 20px; left: 20px; pointer-events:none; z-index:50; }
        .hud-line { font-size:16px; color:#00FF88; background: rgba(0,0,0,0.6); padding: 10px; margin-bottom: 5px; border-radius: 5px; min-width: 150px; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <div id="menu" class="overlay">
        <div class="game-title">UFKA KANAT V11</div>
        <p style="color: #00E5FF; letter-spacing: 2px;">META QUEST VR UYUMLU</p>
        
        <div style="margin: 30px; color: #fff; font-size: 12px; line-height: 2;">
            <b>SAĞ TETİK:</b> GAZ | <b>SOL TETİK:</b> FREN<br>
            <b>SOL ANALOG:</b> DÖNÜŞ | <b>A TUŞU:</b> YÜKSEL | <b>B TUŞU:</b> ALÇAL
        </div>

        <button class="start-btn" onclick="startVR()">VR MODUNDA BAŞLAT</button>
        <button class="start-btn" style="background: #333;" onclick="startGame()">MASAÜSTÜ BAŞLAT</button>
    </div>

    <div id="hud">
        <div class="hud-line">PUAN: <span id="skor-t">0</span></div>
        <div class="hud-line">BATARYA: <span id="bat-t">%100</span></div>
        <div class="hud-line">İRTİFA: <span id="alt-t">0m</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, drone, rings = [];
        let isPlaying = false;
        let score = 0, battery = 100;
        
        // Hareket Değişkenleri
        let pos = new THREE.Vector3(0, 50, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        let rotationY = 0;
        const inputState = { throttle: 0, brake: 0, turn: 0, up: 0, down: 0 };
        const keys = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a101a);
            scene.fog = new THREE.Fog(0x0a101a, 100, 5000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;

            // Işıklandırma
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            createWorld();
            createDrone();
            setupControls();
            
            renderer.setAnimationLoop(animate);
        }

        function createWorld() {
            // Zemin
            const groundGeo = new THREE.PlaneGeometry(10000, 10000, 50, 50);
            groundGeo.rotateX(-Math.PI / 2);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a2a1a, wireframe: false });
            scene.add(new THREE.Mesh(groundGeo, groundMat));

            // Hedef Halkalar
            const ringGeo = new THREE.TorusGeometry(15, 1.5, 16, 32);
            for(let i=0; i<50; i++) {
                const ringMat = new THREE.MeshStandardMaterial({ color: 0x00FF88, emissive: 0x00FF88 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.set((Math.random()-0.5)*1000, 20 + Math.random()*100, -i*250 - 200);
                scene.add(ring);
                rings.push(ring);
            }
        }

        function createDrone() {
            drone = new THREE.Group();
            
            // Ölçekleme Düzeltmesi: Gerçekçi drone boyutları (Metre cinsinden 0.4 x 0.1 x 0.5)
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x333333}));
            drone.add(body);
            
            // Pervaneler (Ölçek küçültüldü)
            const propGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.02, 8);
            const propMat = new THREE.MeshBasicMaterial({color: 0x00FF88, transparent: true, opacity: 0.5});
            
            // Pervane pozisyonları gövde boyutuna göre güncellendi
            const positions = [[0.25, 0.06, 0.25], [-0.25, 0.06, 0.25], [0.25, 0.06, -0.25], [-0.25, 0.06, -0.25]];
            positions.forEach(p => {
                const pr = new THREE.Mesh(propGeo, propMat);
                pr.position.set(...p);
                drone.add(pr);
            });

            scene.add(drone);
            drone.add(camera); 
            
            // Kamera Pozisyonu: Drone küçüldüğü için kamerayı drone'un hemen arkasına ve üzerine sabitledik.
            // Bu sayede VR'da drone devasa gözükmeyecek, oyuncu drone'u makul bir mesafeden takip edecek.
            camera.position.set(0, 0.3, 0.8); 
        }

        function setupControls() {
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            const c1 = renderer.xr.getController(0);
            const c2 = renderer.xr.getController(1);
            scene.add(c1, c2);
        }

        async function startVR() {
            if (navigator.xr) {
                const session = await navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['local-floor', 'bounded-floor']
                });
                renderer.xr.setSession(session);
                startGame();
            } else {
                alert("WebXR desteklenmiyor.");
            }
        }

        function startGame() {
            isPlaying = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
        }

        function updateInputs() {
            inputState.throttle = keys['KeyW'] ? 1 : 0;
            inputState.brake = keys['KeyS'] ? 1 : 0;
            inputState.turn = (keys['KeyA'] ? 1 : 0) - (keys['KeyD'] ? 1 : 0);
            inputState.up = keys['Space'] ? 1 : 0;
            inputState.down = keys['ShiftLeft'] ? 1 : 0;

            const session = renderer.xr.getSession();
            if (session && session.inputSources) {
                for (const source of session.inputSources) {
                    if (!source.gamepad) continue;
                    const btns = source.gamepad.buttons;
                    const axes = source.gamepad.axes;

                    if (source.handedness === 'right') {
                        inputState.throttle = btns[0].pressed ? 1 : 0;
                        inputState.up = btns[4] && btns[4].pressed ? 1 : 0;
                    }
                    if (source.handedness === 'left') {
                        inputState.turn = -axes[2];
                        inputState.brake = btns[0].pressed ? 1 : 0;
                        inputState.down = btns[5] && btns[5].pressed ? 1 : 0;
                    }
                }
            }
        }

        function animate() {
            if (!isPlaying) return;

            updateInputs();

            rotationY += inputState.turn * 0.04;
            
            const speed = (inputState.throttle - inputState.brake) * 1.5;
            vel.x = Math.sin(rotationY) * -speed;
            vel.z = Math.cos(rotationY) * -speed;
            
            if (inputState.up) pos.y += 0.8;
            if (inputState.down) pos.y -= 0.8;

            pos.add(vel);
            pos.y = Math.max(2, pos.y);

            drone.position.copy(pos);
            drone.rotation.y = rotationY;
            drone.rotation.z = -inputState.turn * 0.2;

            rings.forEach(r => {
                if(r.visible && pos.distanceTo(r.position) < 20) {
                    r.visible = false;
                    score += 100;
                    document.getElementById('skor-t').innerText = score;
                }
            });

            document.getElementById('alt-t').innerText = Math.floor(pos.y) + "m";
            
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
