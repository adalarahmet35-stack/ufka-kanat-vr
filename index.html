<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TEVFİK İLERİ AİHL – UFKA KANAT PRO V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Orbitron', sans-serif; touch-action:none; }
        canvas { display:block; width:100vw; height:100vh; position: fixed; top:0; left:0; }
        
        .overlay { 
            position:fixed; top:0; left:0; width:100%; height:100%; 
            display:flex; flex-direction:column; align-items:center; 
            justify-content:center; z-index:100; pointer-events: none; 
        }

        #menu { 
            background:linear-gradient(180deg, rgba(0,4,18,0.96) 0%, rgba(0,18,45,0.96) 100%); 
            cursor:pointer; pointer-events: auto; 
            transition: opacity 0.5s ease;
        }

        .tag { font-size:22px; color:#FFF; margin-bottom:10px; text-shadow: 0 0 10px #000; }
        .game-title { font-size:clamp(45px, 11vw, 95px); font-weight:900; color:#FF6600; text-shadow:0 0 50px #FF6600; margin-bottom:15px; text-align: center; }
        #hs-display { font-size:30px; color:#FFD700; margin-bottom:25px; }
        .credits { font-size:15px; color:#CCC; margin-bottom:35px; letter-spacing:1px; text-align: center; }
        
        .ctrl-box { 
            border: 2px solid rgba(0,229,255,0.4); padding: 20px; 
            border-radius: 12px; background: rgba(0,160,255,0.15); 
            color: #99BBDD; font-size: 14px; text-align: center; 
            line-height: 1.8; margin-bottom: 20px; max-width: 90%;
        }

        .vr-btn-hint { font-size:20px; color:#00FF88; animation:blink 1.2s infinite; margin-top:20px; font-weight: bold; }
        
        #hud { display:none; pointer-events:none; padding:40px; align-items:flex-start; justify-content:flex-start; z-index:50; }
        .hud-line { font-size:24px; color:#FF0000; text-shadow:3px 3px 6px #000; margin-bottom:10px; font-weight:900; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        
        #notif { 
            position:fixed; top:20%; color:#00FF88; font-size:36px; font-weight:900; 
            opacity:0; transition:0.4s; z-index:200; text-shadow: 0 0 30px #00FF88; 
            text-align: center; width: 100%; pointer-events: none;
        }

        #vr-control-button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,255,136,0.2); border: 1px solid #00FF88;
            color: #00FF88; padding: 12px 24px; font-family: 'Orbitron'; cursor: pointer;
            border-radius: 8px; font-size: 14px; font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="notif"></div>

    <div id="menu" class="overlay" onclick="handleGlobalClick(event)">
        <div class="tag">TEVFİK İLERİ AİHL</div>
        <div class="game-title">UFKA KANAT</div>
        <div id="hs-display">REKOR: 0</div>
        <div class="credits">AHMET SAİD ADALAR | ÖMER PİLE | KEREM KARACA</div>
        <div class="ctrl-box">
            <strong>BİLGİSAYAR:</strong> W/S/A/D ve Boşluk<br>
            <strong>VR:</strong> Sol/Sağ Joystick ve Tetikler<br>
            <strong>BUTONLAR:</strong> A/X (Yüksel), B/Y (Çıkış)
        </div>
        <div class="vr-btn-hint">BAŞLATMAK İÇİN DOKUNUN</div>
    </div>

    <div id="hud" class="overlay">
        <div id="skor-t" class="hud-line">PUAN: 0</div>
        <div id="bat-t" class="hud-line">BATARYA: %100</div>
        <div id="alt-t" class="hud-line">İRTİFA: 0m</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const VRButtonManual = {
            createButton: function(renderer) {
                const btn = document.createElement('button');
                btn.id = "vr-control-button";
                btn.textContent = 'VR DESTEĞİ KONTROL EDİLİYOR...';
                if ('xr' in navigator) {
                    navigator.xr.isSessionSupported('immersive-vr').then(supported => {
                        if (supported) {
                            btn.textContent = 'VR MODUNA GEÇ';
                            btn.style.display = "block";
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                navigator.xr.requestSession('immersive-vr', { 
                                    optionalFeatures: ['local-floor', 'bounded-floor'] 
                                }).then(session => {
                                    renderer.xr.setSession(session);
                                    startGame(); 
                                });
                            };
                        } else {
                            btn.textContent = 'VR MODU KULLANILAMIYOR';
                        }
                    });
                }
                return btn;
            }
        };

        'use strict';

        let scene, camera, renderer, clock, drone, props = [];
        let isPlaying = false, gameStarted = false;
        let points = 0, battery = 100, highScore = 0;
        let pos = new THREE.Vector3(0, 50, 0), vel = new THREE.Vector3(0, 0, 0), hpr = new THREE.Euler(0,0,0);
        const keys = {}, rings = [];
        const vrInput = { thrust: 0, turn: 0, forward: 0, upward: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.00015);

            camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 50000);
            
            const canvas = document.getElementById('c');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;

            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xFFFFFF, 0.7));
            const sun = new THREE.DirectionalLight(0xFFFFFF, 1.2);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            document.body.appendChild(VRButtonManual.createButton(renderer));

            createEnvironment();
            createDetailedDrone();
            
            highScore = parseInt(localStorage.getItem('ufka_kanat_v5_pro_hs')) || 0;
            document.getElementById('hs-display').innerText = `REKOR: ${highScore}`;

            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            window.addEventListener('resize', onWindowResize);
            
            renderer.setAnimationLoop(animate);
            gameStarted = true;
        }

        function getTerrainHeight(x, z) {
            let height = 0;
            let absX = Math.abs(x);
            if (absX < 600) {
                height = Math.sin(x * 0.01) * 5 + Math.cos(z * 0.01) * 5;
            } else {
                let mountainSlope = (absX - 600) * 0.5;
                height = Math.pow(mountainSlope, 1.2);
                height += Math.sin(x * 0.005) * 100 + Math.cos(z * 0.005) * 120;
            }
            return height;
        }

        function createEnvironment() {
            const worldSize = 20000;
            const segments = 128;
            const terrainGeo = new THREE.PlaneGeometry(worldSize, worldSize, segments, segments);
            terrainGeo.rotateX(-Math.PI / 2);

            const posAttr = terrainGeo.attributes.position;
            const colors = [];
            const color = new THREE.Color();

            for (let i = 0; i < posAttr.count; i++) {
                let x = posAttr.getX(i);
                let z = posAttr.getZ(i);
                let h = getTerrainHeight(x, z);
                posAttr.setY(i, h);

                if (h > 600) color.setHex(0xEEEEEE);
                else if (h > 200) color.setHex(0x666666);
                else color.setHex(0x348C31);
                colors.push(color.r, color.g, color.b);
            }
            
            terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            terrainGeo.computeVertexNormals();
            const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true, side: THREE.DoubleSide });
            const terrain = new THREE.Mesh(terrainGeo, terrainMat);
            scene.add(terrain);

            const treeCount = 3000;
            const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 8, 6);
            const leavesGeo = new THREE.ConeGeometry(4, 15, 6);
            const trunkMat = new THREE.MeshLambertMaterial({color: 0x4d2d1e});
            const leavesMat = new THREE.MeshLambertMaterial({color: 0x1a4a1a});

            for (let i = 0; i < treeCount; i++) {
                let tx = (Math.random() - 0.5) * 15000;
                let tz = (Math.random() - 0.5) * 15000;
                if (Math.abs(tx) > 80) {
                    let th = getTerrainHeight(tx, tz);
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                    leaves.position.y = 8;
                    tree.add(trunk); tree.add(leaves);
                    tree.position.set(tx, th + 4, tz);
                    tree.scale.setScalar(0.5 + Math.random() * 1.5);
                    scene.add(tree);
                }
            }

            const rGeo = new THREE.TorusGeometry(15, 1.5, 12, 48);
            const rMat = new THREE.MeshLambertMaterial({ color: 0x00FF88, emissive: 0x00FF88, emissiveIntensity: 1 });
            for(let i=0; i<150; i++) {
                const ring = new THREE.Mesh(rGeo, rMat);
                ring.position.set((Math.random()-0.5)*300, 60 + Math.random()*150, 500 + i*450);
                scene.add(ring);
                rings.push(ring);
            }
        }

        function createDetailedDrone() {
            drone = new THREE.Group();

            // 1. Ana Gövde (Karbon Fiber Görünümlü)
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3.5), bodyMat);
            drone.add(body);

            // Üst Panel
            const topPanel = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 2.5), new THREE.MeshLambertMaterial({color: 0x333333}));
            topPanel.position.y = 0.5;
            drone.add(topPanel);

            // 2. Kollar (X şeklinde)
            const armGeo = new THREE.BoxGeometry(0.3, 0.2, 5);
            const arm1 = new THREE.Mesh(armGeo, bodyMat);
            arm1.rotation.y = Math.PI / 4;
            drone.add(arm1);
            const arm2 = new THREE.Mesh(armGeo, bodyMat);
            arm2.rotation.y = -Math.PI / 4;
            drone.add(arm2);

            // 3. Motorlar ve Pervaneler
            const motorGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 8);
            const motorMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
            const propGeo = new THREE.BoxGeometry(3.5, 0.05, 0.3);
            const propMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });

            const propPos = [
                [1.7, 0.4, 1.7], [-1.7, 0.4, 1.7],
                [1.7, 0.4, -1.7], [-1.7, 0.4, -1.7]
            ];

            propPos.forEach(p => {
                const motor = new THREE.Mesh(motorGeo, motorMat);
                motor.position.set(p[0], p[1] - 0.2, p[2]);
                drone.add(motor);

                const pr = new THREE.Mesh(propGeo, propMat);
                pr.position.set(p[0], p[1], p[2]);
                drone.add(pr);
                props.push(pr);
            });

            // 4. Kamera (Ön)
            const camGroup = new THREE.Group();
            const lens = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshPhongMaterial({color: 0x111111, shininess: 100}));
            const lensOuter = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16), bodyMat);
            lensOuter.rotation.x = Math.PI / 2;
            camGroup.add(lensOuter);
            camGroup.add(lens);
            camGroup.position.set(0, -0.2, 1.8);
            drone.add(camGroup);

            // 5. İniş Takımları (Skid)
            const skidGeo = new THREE.BoxGeometry(0.15, 1.2, 3);
            const skid1 = new THREE.Mesh(skidGeo, bodyMat);
            skid1.position.set(0.8, -0.8, 0);
            drone.add(skid1);
            const skid2 = new THREE.Mesh(skidGeo, bodyMat);
            skid2.position.set(-0.8, -0.8, 0);
            drone.add(skid2);

            // 6. Navigasyon Işıkları (Emissive)
            const lightGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const redLight = new THREE.Mesh(lightGeo, new THREE.MeshBasicMaterial({color: 0xff0000}));
            redLight.position.set(-1.7, 0.2, -1.7);
            drone.add(redLight);

            const greenLight = new THREE.Mesh(lightGeo, new THREE.MeshBasicMaterial({color: 0x00ff00}));
            greenLight.position.set(1.7, 0.2, -1.7);
            drone.add(greenLight);

            scene.add(drone);
            drone.visible = false;
        }

        function updateVRInput() {
            const session = renderer.xr.getSession();
            if (!session) return;
            vrInput.thrust = 0; vrInput.turn = 0; vrInput.forward = 0; vrInput.upward = 0;
            for (const source of session.inputSources) {
                if (source.gamepad) {
                    const axes = source.gamepad.axes;
                    const buttons = source.gamepad.buttons;
                    if (source.handedness === 'left') {
                        vrInput.turn = -axes[0];
                        vrInput.forward = -axes[1];
                        if (buttons[4] && buttons[4].pressed) vrInput.upward = 1; 
                    }
                    if (source.handedness === 'right') {
                        if (buttons[4] && buttons[4].pressed) vrInput.upward = 1; 
                        if (buttons[0].pressed) vrInput.forward = 1; 
                        if (buttons[5] && buttons[5].pressed) gameOver(); 
                    }
                }
            }
        }

        function startGame() {
            if(!gameStarted || isPlaying) return;
            isPlaying = true;
            points = 0; battery = 100;
            pos.set(0, 80, 0); vel.set(0, 0, 0); hpr.set(0, 0, 0);
            document.getElementById('menu').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
            }, 500);
            drone.visible = true;
            showNotif("SİSTEMLER ÇEVRİMİÇİ");
        }

        function handleGlobalClick() { if(!isPlaying) startGame(); }

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.1);
            if (isPlaying) {
                updateVRInput();
                let accel = new THREE.Vector3(0, -9.81, 0);
                
                let moveForward = (keys['w'] ? 1 : 0) + (vrInput.forward > 0.1 ? vrInput.forward : 0);
                let moveBackward = (keys['s'] ? 1 : 0);
                let turnSpeed = (keys['a'] ? 3.5 : 0) - (keys['d'] ? 3.5 : 0) + (vrInput.turn * 4);
                let lift = (keys[' '] ? 60 : 0) + (vrInput.upward * 70);

                if (moveForward) { 
                    let m = new THREE.Vector3(0, 0, 150 * moveForward); 
                    m.applyEuler(hpr); accel.add(m); 
                }
                if (moveBackward) { 
                    let m = new THREE.Vector3(0, 0, -100); 
                    m.applyEuler(hpr); accel.add(m); 
                }
                
                hpr.y += turnSpeed * dt;
                accel.y += lift;

                vel.add(accel.sub(vel.clone().multiplyScalar(1.5)).multiplyScalar(dt));
                pos.add(vel.clone().multiplyScalar(dt));

                drone.position.copy(pos);
                drone.rotation.copy(hpr);
                // Pervane dönüş animasyonu
                props.forEach((p, i) => p.rotation.y += (i % 2 === 0 ? 1.8 : -1.8));

                battery -= dt * 1.6;
                document.getElementById('skor-t').innerText = `PUAN: ${points}`;
                document.getElementById('bat-t').innerText = `BATARYA: %${Math.max(0, Math.floor(battery))}`;
                document.getElementById('alt-t').innerText = `İRTİFA: ${Math.floor(pos.y)}m`;

                rings.forEach(r => {
                    if(r.visible && pos.distanceTo(r.position) < 28) {
                        r.visible = false;
                        points += 1000;
                        battery = Math.min(100, battery + 20);
                        showNotif("+1000 VERİ");
                    }
                });

                if(!renderer.xr.isPresenting) {
                    let camOff = new THREE.Vector3(0, 14, -40);
                    camOff.applyEuler(hpr);
                    camera.position.lerp(pos.clone().add(camOff), 0.1);
                    camera.lookAt(pos);
                }

                let groundAtPos = getTerrainHeight(pos.x, pos.z);
                if(pos.y < groundAtPos + 1.2 || battery <= 0) gameOver();

            } else {
                const t = Date.now() * 0.0003;
                camera.position.set(Math.cos(t)*800, 400, Math.sin(t)*800);
                camera.lookAt(0, 50, 0);
            }
            renderer.render(scene, camera);
        }

        function gameOver() {
            isPlaying = false;
            drone.visible = false;
            if(points > highScore) {
                highScore = points;
                localStorage.setItem('ufka_kanat_v5_pro_hs', highScore);
                document.getElementById('hs-display').innerText = `REKOR: ${highScore}`;
            }
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('menu').style.opacity = '1';
            document.getElementById('hud').style.display = 'none';
            rings.forEach(r => r.visible = true);
            showNotif("SİNYAL KAYBI");
        }

        function showNotif(m) {
            const n = document.getElementById('notif');
            n.innerText = m; n.style.opacity = '1';
            setTimeout(() => n.style.opacity = '0', 2000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
