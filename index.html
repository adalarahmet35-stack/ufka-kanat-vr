<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFKA KANAT VR - TEKNOFEST</title>
    <style>
        body { margin: 0; background-color: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #001a33 0%, #000 100%); z-index: 2000; color: #00FFCC;
        }
        .btn-start {
            padding: 20px 60px; font-size: 24px; background: transparent; color: #00FFCC;
            border: 3px solid #00FFCC; border-radius: 10px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="font-size: 3rem; letter-spacing: 10px;">UFKA KANAT</h1>
        <p style="color: #FF6600;">VR DOĞA SİMÜLASYONU</p>
        <button class="btn-start" id="start-btn">SİSTEMLERİ BAŞLAT</button>
        <p style="font-size: 0.9rem; margin-top: 20px;">PC: WASD | VR: Tetik ve Joystick</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/xr/VRButton.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/xr/XRControllerModelFactory.js"></script>

    <script>
        let scene, camera, renderer, drone, clock;
        let velocity = new THREE.Vector3();
        let rotationY = 0;
        let isPlaying = false;
        const keys = {};

        // VR İÇİ GÖSTERGELER (3D HUD)
        let hudGroup, hudText;

        window.onload = () => {
            init();
            animate();
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 500);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            clock = new THREE.Clock();

            // IŞIKLANDIRMA
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            createLandscape();
            createDrone();
            create3DHUD();

            // KONTROLLER
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            document.getElementById('start-btn').onclick = () => {
                document.getElementById('overlay').style.display = 'none';
                isPlaying = true;
            };

            window.addEventListener('resize', onWindowResize);
        }

        function createLandscape() {
            // YEŞİL ZEMİN
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x348C31 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // AĞAÇLAR
            for (let i = 0; i < 120; i++) {
                const x = (Math.random() - 0.5) * 400;
                const z = (Math.random() - 0.5) * 400;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5), new THREE.MeshStandardMaterial({color: 0x5D4037}));
                const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 8), new THREE.MeshStandardMaterial({color: 0x1B5E20}));
                trunk.position.set(x, 0.75, z);
                leaves.position.set(x, 3, z);
                scene.add(trunk, leaves);
            }

            // DAĞLAR
            for (let i = 0; i < 10; i++) {
                const mGeo = new THREE.ConeGeometry(40, 60, 4);
                const mMat = new THREE.MeshStandardMaterial({ color: 0x616161 });
                const m = new THREE.Mesh(mGeo, mMat);
                m.position.set((Math.random()-0.5)*600, 25, (Math.random()-0.5)*600);
                scene.add(m);
            }
        }

        function createDrone() {
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.8), new THREE.MeshStandardMaterial({ color: 0x212121 }));
            const front = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            front.position.z = -0.4;
            drone.add(body, front);
            drone.position.y = 5;
            scene.add(drone);
        }

        // VR İÇİNDE GÖRÜNEN GÖSTERGE SİSTEMİ
        function create3DHUD() {
            hudGroup = new THREE.Group();
            // HUD'ı dronun biraz önünde ve üstünde tutacağız
            scene.add(hudGroup);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(renderLoop);
        }

        function renderLoop() {
            const dt = clock.getDelta();
            if (!isPlaying) {
                renderer.render(scene, camera);
                return;
            }

            let throttle = 0, yaw = 0, vertical = 0;

            // VR INPUTS
            const session = renderer.xr.getSession();
            if (session) {
                for (const source of session.inputSources) {
                    if (!source.gamepad) continue;
                    const a = source.gamepad.axes;
                    const b = source.gamepad.buttons;
                    if (source.handedness === 'right') {
                        if (b[0].pressed || b[1].pressed) throttle = 1;
                        if (b[4].pressed || b[5].pressed) vertical = -1;
                    } else if (source.handedness === 'left') {
                        if (b[4].pressed || b[5].pressed) vertical = 1;
                        if (Math.abs(a[2]) > 0.1) yaw = -a[2];
                    }
                }
            }

            // PC INPUTS
            if (keys['KeyW'] || keys['ArrowUp']) throttle = 1;
            if (keys['KeyS'] || keys['ArrowDown']) vertical = -1;
            if (keys['KeyA'] || keys['ArrowLeft']) yaw = 1;
            if (keys['KeyD'] || keys['ArrowRight']) yaw = -1;
            if (keys['Space'] || keys['KeyE']) vertical = 1;

            // PHYSICS
            if (throttle) {
                const dir = new THREE.Vector3(0, 0, -1).applyEuler(drone.rotation);
                velocity.add(dir.multiplyScalar(40 * dt));
            }
            rotationY += yaw * 2.5 * dt;
            velocity.y += (vertical * 20 * dt) - (0.12 * dt);
            velocity.multiplyScalar(0.97);

            drone.rotation.y = rotationY;
            drone.position.add(velocity.clone().multiplyScalar(dt));
            if (drone.position.y < 0.5) { drone.position.y = 0.5; velocity.y = 0; }

            // CAMERA FOLLOW (VR Optimized)
            const camOffset = new THREE.Vector3(0, 2.5, 7).applyMatrix4(drone.matrixWorld);
            camera.position.lerp(camOffset, 0.15);
            camera.lookAt(drone.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
