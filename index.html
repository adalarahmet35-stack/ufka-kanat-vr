<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UFKA KANAT PRO V11 - VR FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#0a101a; font-family:'Orbitron', sans-serif; touch-action:none; }
        canvas { display:block; width:100vw; height:100vh; position: fixed; top:0; left:0; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; pointer-events: none; }
        #menu { background: radial-gradient(circle, rgba(5,20,40,0.85) 0%, rgba(2,5,15,1) 100%); cursor:pointer; pointer-events: auto; transition: opacity 0.6s ease; overflow-y: auto; padding: 20px; }
        .game-title { font-size:clamp(30px, 8vw, 80px); font-weight:900; color:#FF6600; text-shadow:0 0 30px rgba(255,102,0,0.5); margin-bottom:5px; text-align: center; }
        .controls-container { display: flex; gap: 20px; max-width: 90%; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; }
        .ctrl-card { flex: 1; min-width: 280px; border: 1px solid rgba(0,229,255,0.2); padding: 20px; border-radius: 15px; background: rgba(0,15,30,0.8); color: #fff; }
        .start-btn-hint { font-size:14px; color:#00FF88; animation:blink 2s infinite; font-weight: bold; letter-spacing: 3px; margin-top: 10px; cursor: pointer; pointer-events: auto; }
        #hud { display:none; pointer-events:none; padding:30px; z-index:50; flex-direction: column; align-items: flex-start; }
        .hud-line { font-size:14px; color:#FFF; margin-bottom:8px; background: rgba(0,15,30,0.7); padding: 8px 15px; border-left: 4px solid #FF6600; min-width: 180px; display: flex; justify-content: space-between; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="menu" class="overlay">
        <div class="game-title">UFKA KANAT</div>
        <div class="controls-container">
            <div class="ctrl-card">
                <h3>🥽 VR KONTROLLER</h3>
                <p>Sağ Tetik: Gaz | Sol Tetik: Fren</p>
                <p>Sol Analog: Dönüş | A: Yukarı | B: Aşağı</p>
            </div>
        </div>
        <div class="start-btn-hint" onclick="startGame()">UÇUŞA BAŞLAMAK İÇİN DOKUNUN</div>
    </div>

    <div id="hud" class="overlay">
        <div class="hud-line">PUAN <span id="skor-t">0</span></div>
        <div class="hud-line">BATARYA <span id="bat-t">%100</span></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- VR Modelleri için gerekli ek paket -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/xr/XRControllerModelFactory.js"></script>

    <script>
        let scene, camera, renderer, clock, drone;
        let isPlaying = false;
        let pos = new THREE.Vector3(0, 10, 0), vel = new THREE.Vector3(0, 0, 0), rotationY = 0;
        const inputState = { forward: 0, backward: 0, turn: 0, up: 0, down: 0 };
        let controller1, controller2;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a3a);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 10000);
            
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Zemin
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({color: 0x222222}));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Drone (Basit bir kutu temsilcisi)
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 1), new THREE.MeshStandardMaterial({color: 0xff6600}));
            drone.add(body);
            scene.add(drone);

            // VR Kontrolcü Kurulumu
            setupVR();

            clock = new THREE.Clock();
            renderer.setAnimationLoop(animate);
        }

        function setupVR() {
            controller1 = renderer.xr.getController(0); // Sağ veya Sol
            controller2 = renderer.xr.getController(1);
            scene.add(controller1, controller2);

            const modelFactory = new THREE.XRControllerModelFactory();
            const grip1 = renderer.xr.getControllerGrip(0);
            grip1.add(modelFactory.createControllerModel(grip1));
            scene.add(grip1);

            const grip2 = renderer.xr.getControllerGrip(1);
            grip2.add(modelFactory.createControllerModel(grip2));
            scene.add(grip2);
        }

        function updateVRInput() {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (source.gamepad) {
                    const axes = source.gamepad.axes;
                    const buttons = source.gamepad.buttons;

                    if (source.handedness === 'right') {
                        inputState.forward = buttons[0].pressed ? 1 : 0; // Sağ Tetik
                        inputState.down = buttons[5]?.pressed ? 1 : 0;   // B Tuşu
                    } 
                    else if (source.handedness === 'left') {
                        inputState.backward = buttons[0].pressed ? 1 : 0; // Sol Tetik
                        inputState.up = buttons[4]?.pressed ? 1 : 0;     // A Tuşu
                        inputState.turn = Math.abs(axes[2]) > 0.1 ? -axes[2] : 0; // Sol Analog X
                    }
                }
            }
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            isPlaying = true;
            // Meta Quest'te VR modunu başlatır
            if (renderer.xr.getSession() === null) {
                const sessionInit = { optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'] };
                navigator.xr.requestSession('immersive-vr', sessionInit).then(s => renderer.xr.setSession(s));
            }
        }

        function animate() {
            const dt = clock.getDelta();

            if (isPlaying) {
                updateVRInput();

                // Fizik Hesaplamaları
                if (inputState.forward) vel.z -= 20 * dt;
                if (inputState.backward) vel.z += 20 * dt;
                if (inputState.up) vel.y += 15 * dt;
                if (inputState.down) vel.y -= 15 * dt;

                rotationY += inputState.turn * 2 * dt;
                
                // Sürtünme (Yavaşlama)
                vel.multiplyScalar(0.98);

                // Pozisyonu güncelle
                const moveVec = vel.clone().applyEuler(new THREE.Euler(0, rotationY, 0));
                pos.add(moveVec.multiplyScalar(dt));

                drone.position.copy(pos);
                drone.rotation.y = rotationY;

                // Kamera takibi (VR değilken faydalı)
                camera.position.set(pos.x, pos.y + 2, pos.z + 5);
                camera.lookAt(pos);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
